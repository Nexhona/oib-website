server {
    listen 127.0.0.1:8086;
    listen [::1]:8086;
    server_name oib.kolica.ch;

    root /var/www/oib;
    index index.html;

    autoindex off;
    absolute_redirect off;
    port_in_redirect off;

    # Sicherheits-Header.
    # NOTE: KEIN X-Frame-Options/DENY und KEINE frame-ancestors-Sperre, weil diese
    # Seite als Umweg per <iframe> in die Wix-Plattform (o-i-b.ch) eingebettet wird.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noai, noimageai" always;

    # Force HTTPS (cloudflared setzt X-Forwarded-Proto)
    if ($http_x_forwarded_proto = "http") {
        return 301 https://$host$request_uri;
    }

    # ---- Kontaktformular-API -> Flask-Backend (muss VOR location / stehen) ----
    location /api/contact {
        proxy_pass http://127.0.0.1:5055;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Statische Assets (Bilder/Flyer/Logo): lange cachen
    location ~* \.(jpg|jpeg|png|gif|webp|svg|ico|css|js|woff|woff2|ttf|eot|mp4|webm)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header X-Content-Type-Options "nosniff" always;
    }

    access_log /var/log/nginx/oib_access.log;
    error_log /var/log/nginx/oib_error.log;
}
